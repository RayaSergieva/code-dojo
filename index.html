<head>

<link rel="stylesheet" href="styles.css">

<body>
<div class="cord"></div>
<div class="stage">
  <div class="plaque">
    <span class="en">DOJO OF BYTES</span>
    <span class="orn">&#9670; &#9670; &#9670;</span>
  </div>

  <div class="frame">
    <div class="scroll-side left">
      <span class="ornament o1"></span>
      <span class="bar b1"></span>
      <span class="ornament o2"></span>
      <span class="bar b2"></span>
      <span class="ornament o3"></span>
      <span class="bar b3"></span>
      <span class="ornament o4"></span>
      <span class="bar b4"></span>
      <span class="ornament o5"></span>
    </div>
    <div class="scroll-side right">
      <span class="ornament o1"></span>
      <span class="bar b1"></span>
      <span class="ornament o2"></span>
      <span class="bar b2"></span>
      <span class="ornament o3"></span>
      <span class="bar b3"></span>
      <span class="ornament o4"></span>
      <span class="bar b4"></span>
      <span class="ornament o5"></span>
    </div>

    <div class="corner tl"><svg viewBox="0 0 40 40"><g fill="none" stroke="#d9b85c" stroke-width="1.5">
      <circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2.5" fill="#d9b85c"/>

    </g></svg></div>
    <div class="corner tr"><svg viewBox="0 0 40 40"><g fill="none" stroke="#d9b85c" stroke-width="1.5">
      <circle cx="28" cy="12" r="6"/><circle cx="28" cy="12" r="2.5" fill="#d9b85c"/>
      <path d="M28 4 L28 8 M36 12 L32 12 M28 20 L28 16 M20 12 L24 12 M22 6 L25 9 M34 6 L31 9 M34 18 L31 15 M22 18 L25 15"/>
    </g></svg></div>
    <div class="corner bl"><svg viewBox="0 0 40 40"><g fill="none" stroke="#d9b85c" stroke-width="1.5">
      <circle cx="12" cy="28" r="6"/><circle cx="12" cy="28" r="2.5" fill="#d9b85c"/>
      <path d="M12 20 L12 24 M20 28 L16 28 M12 36 L12 32 M4 28 L8 28 M6 22 L9 25 M18 22 L15 25 M18 34 L15 31 M6 34 L9 31"/>
    </g></svg></div>
    <div class="corner br"><svg viewBox="0 0 40 40"><g fill="none" stroke="#d9b85c" stroke-width="1.5">
      <circle cx="28" cy="28" r="6"/><circle cx="28" cy="28" r="2.5" fill="#d9b85c"/>
      <path d="M28 20 L28 24 M36 28 L32 28 M28 36 L28 32 M20 28 L24 28 M22 22 L25 25 M34 22 L31 25 M34 34 L31 31 M22 34 L25 31"/>
    </g></svg></div>

    <canvas id="game" width="960" height="540"></canvas>
  </div>

  <div class="motto">
    <span class="en">FIST<span class="sep">&middot;</span>HEART<span class="sep">&middot;</span>TECHNIQUE</span>
  </div>
</div>

<script src="src/config.js"></script>
